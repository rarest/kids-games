<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇吃痘痘 🐍</title>
<style>
  :root {
    --bg: #1b2330;
    --panel: #232d3d;
    --skin: #ffe0c2;
    --skin-dark: #f3c69e;
    --snake: #5fd068;
    --snake-dark: #3da14a;
    --pimple: #ff5c6c;
    --pimple-core: #fff3a0;
    --text: #e8edf4;
    --accent: #ffb454;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% 0%, #2a3547, var(--bg));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  h1 span { color: var(--accent); }
  .hud {
    display: flex;
    gap: 28px;
    font-size: 15px;
    font-weight: 600;
  }
  .hud b { color: var(--accent); font-size: 19px; }
  .stage {
    position: relative;
    background: var(--panel);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.04);
    padding: 10px;
  }
  canvas {
    display: block;
    border-radius: 10px;
    background:
      linear-gradient(45deg, rgba(255,255,255,.018) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.018) 75%) 0 0/40px 40px,
      linear-gradient(45deg, rgba(255,255,255,.018) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.018) 75%) 20px 20px/40px 40px,
      #1f2836;
  }
  .overlay {
    position: absolute;
    inset: 10px;
    border-radius: 10px;
    background: rgba(20,26,36,.86);
    backdrop-filter: blur(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h2 { font-size: 26px; }
  .overlay p { font-size: 14px; opacity: .8; line-height: 1.6; max-width: 280px; }
  button {
    font: inherit;
    font-weight: 700;
    font-size: 16px;
    color: #1b2330;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 12px 30px;
    cursor: pointer;
    transition: transform .08s, filter .15s;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(.95); }
  .hint { font-size: 12px; opacity: .55; }
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
  }
  .pad {
    color: var(--text);
    background: var(--panel);
    border-radius: 12px;
    padding: 0;
    font-size: 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .pad:active { background: var(--accent); color: #1b2330; }
  .pad.up    { grid-area: 1 / 2; }
  .pad.left  { grid-area: 2 / 1; }
  .pad.right { grid-area: 2 / 3; }
  .pad.down  { grid-area: 3 / 2; }
  .btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 420px; }
  .act {
    color: var(--text);
    background: var(--panel);
    font-size: 14px;
    padding: 9px 14px;
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .act:active { transform: scale(.94); }
  .stage:fullscreen, .stage:-webkit-full-screen {
    display: flex; align-items: center; justify-content: center;
    width: 100vw; height: 100vh; border-radius: 0;
  }
  .stage:fullscreen canvas, .stage:-webkit-full-screen canvas { width: 90vmin; height: 90vmin; }
  .stage.big canvas { width: 600px; height: 600px; }
  .play-area { display: flex; align-items: flex-start; gap: 16px; }
  .board {
    background: var(--panel);
    border-radius: 14px;
    padding: 10px 16px 12px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    min-width: 200px;
  }
  .board-title { font-size: 13px; font-weight: 700; text-align: center; opacity: .8; margin-bottom: 6px; }
  .board ol { list-style: none; margin: 0; padding: 0; }
  .board li {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 8px; border-radius: 8px; font-weight: 700;
    background: rgba(255,255,255,.05); margin-bottom: 4px;
  }
  .board .rscore { color: var(--accent); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <h1>🐍 贪吃蛇吃<span>痘痘</span> 💥</h1>
  <div class="hud">
    <div>得分 <b id="score">0</b></div>
  </div>
  <div class="play-area">
    <div class="stage">
      <canvas id="game" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ovTitle">准备好了吗？</h2>
        <p id="ovDesc">控制小蛇吃掉满屏五颜六色的痘痘 💥<br>🌸+500 · 🌈吃光全屏 · ⚫分数翻倍 · 🟢+200 · 🟡+50 · 🔵加速 · 🟣减速 · 🔴+1<br>撞墙穿墙、咬自己也穿透，吃到 1000 亿分通关！</p>
        <button id="startBtn">开始游戏</button>
        <div class="hint">鼠标移动 / 方向键 / WASD / 屏幕按钮 都能操控 · 空格暂停 · R 重开 · F 全屏 · J 放大<br>吃满 1000 亿分即通关 🎉</div>
      </div>
    </div>
    <div class="board">
      <div class="board-title">📋 最近成绩</div>
      <ol id="ranks">
        <li><span class="rscore">—</span></li>
        <li><span class="rscore">—</span></li>
        <li><span class="rscore">—</span></li>
      </ol>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="pad up"    data-dir="up">▲</button>
      <button class="pad left"  data-dir="left">◀</button>
      <button class="pad right" data-dir="right">▶</button>
      <button class="pad down"  data-dir="down">▼</button>
    </div>
    <div class="btns">
      <button class="act" data-act="start">▶ 开始</button>
      <button class="act" data-act="pause">⏸ 暂停</button>
      <button class="act" data-act="restart">🔄 重开</button>
      <button class="act" data-act="refresh">🔀 刷痘</button>
      <button class="act" data-act="cheat">😈 作弊+100亿</button>
      <button class="act" data-act="big">🔍 放大</button>
    </div>
  </div>

<script>
(() => {

  // ---------- audio (WebAudio beeps) ----------
  let actx = null;
  function beep(freq, dur=0.08, type='sine', vol=0.2) {
    try {
      actx = actx || new (window.AudioContext||window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(actx.destination);
      const t = actx.currentTime;
      o.start(t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      o.stop(t+dur);
    } catch(e){}
  }
  function goodSound() { beep(880,0.07,'triangle'); }
  function clearSound() { beep(660,0.09,'square',0.18); setTimeout(()=>beep(990,0.12,'square',0.18),90); setTimeout(()=>beep(1320,0.14,'square',0.18),190); }
  function badSound() { beep(160,0.18,'sawtooth',0.18); }
  function speak(text){
    try {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = 0.85;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch(e){}
  }

  // ---------- background music: Pachelbel Canon (rock arrangement) ----------
  // fully synthesized with WebAudio, no audio files. Canon in D progression:
  // D - A - Bm - F#m - G - D - G - A  (the famous 8-bar loop)
  const MUSIC = (() => {
    let ctx = null, master = null, distCurve = null;
    let timer = null, started = false, muted = false;
    let step = 0, nextTime = 0;
    const BPM = 116;
    const EIGHTH = (60 / BPM) / 2;      // seconds per eighth note
    const BARS = 8, STEPS = BARS * 8;   // 8 bars * 8 eighths

    function noteFreq(name) {
      const m = /^([A-G])(#?)(-?\d)$/.exec(name);
      const base = { C:-9, D:-7, E:-5, F:-4, G:-2, A:0, B:2 };
      let s = base[m[1]] + (m[2] ? 1 : 0) + (parseInt(m[3],10) - 4) * 12;
      return 440 * Math.pow(2, s / 12);
    }

    // chord roots + arpeggio + pad triad per bar
    const ROOT = ['D2','A2','B2','F#2','G2','D2','G2','A2'];
    const ARP = [
      ['D4','F#4','A4','D5','F#5','D5','A4','F#4'],
      ['A3','C#4','E4','A4','C#5','A4','E4','C#4'],
      ['B3','D4','F#4','B4','D5','B4','F#4','D4'],
      ['F#3','A3','C#4','F#4','A4','F#4','C#4','A3'],
      ['G3','B3','D4','G4','B4','G4','D4','B3'],
      ['D4','F#4','A4','D5','F#5','D5','A4','F#4'],
      ['G3','B3','D4','G4','B4','G4','D4','B3'],
      ['A3','C#4','E4','A4','C#5','E5','C#5','A4'],
    ];
    const PAD = [
      ['D4','F#4','A4'], ['A3','C#4','E4'], ['B3','D4','F#4'], ['F#3','A3','C#4'],
      ['G3','B3','D4'],  ['D4','F#4','A4'], ['G3','B3','D4'],  ['A3','C#4','E4'],
    ];

    function makeDist(amount) {
      const n = 1024, curve = new Float32Array(n), deg = Math.PI / 180;
      for (let i = 0; i < n; i++) {
        const x = i * 2 / n - 1;
        curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function env(node, t, peak, dur, atk = 0.005) {
      const g = node.gain;
      g.setValueAtTime(0.0001, t);
      g.exponentialRampToValueAtTime(peak, t + atk);
      g.exponentialRampToValueAtTime(0.0001, t + dur);
    }

    function tone(type, freq, t, dur, peak, dest) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(dest || master);
      env(g, t, peak, dur);
      o.start(t); o.stop(t + dur + 0.02);
    }

    function guitar(freq, t, dur, peak) {
      // sawtooth through distortion for a rock-guitar tone
      const o = ctx.createOscillator(), g = ctx.createGain(), d = ctx.createWaveShaper();
      o.type = 'sawtooth'; o.frequency.value = freq;
      d.curve = distCurve; d.oversample = '2x';
      o.connect(d); d.connect(g); g.connect(master);
      env(g, t, peak, dur, 0.004);
      o.start(t); o.stop(t + dur + 0.02);
    }

    // drum hits
    function noiseBuf() {
      const len = ctx.sampleRate * 0.3, b = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      return b;
    }
    let NB = null;
    function kick(t) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(140, t);
      o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
      g.gain.setValueAtTime(0.9, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.2);
    }
    function snare(t) {
      const s = ctx.createBufferSource(), g = ctx.createGain(), hp = ctx.createBiquadFilter();
      s.buffer = NB; hp.type = 'highpass'; hp.frequency.value = 1500;
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      s.connect(hp); hp.connect(g); g.connect(master);
      s.start(t); s.stop(t + 0.16);
    }
    function hat(t, open) {
      const s = ctx.createBufferSource(), g = ctx.createGain(), hp = ctx.createBiquadFilter();
      s.buffer = NB; hp.type = 'highpass'; hp.frequency.value = 7000;
      const dur = open ? 0.12 : 0.04;
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      s.connect(hp); hp.connect(g); g.connect(master);
      s.start(t); s.stop(t + dur + 0.02);
    }

    function scheduleStep(gstep, t) {
      const bar = Math.floor(gstep / 8) % BARS;
      const i = gstep % 8;          // eighth within bar
      const beatHit = (i % 2 === 0); // on a quarter-note beat

      // drums
      if (i === 0 || i === 4) kick(t);
      if (i === 2 || i === 6) snare(t);
      hat(t, i === 7);

      // bass — driving eighths, root with octave bounce
      const root = noteFreq(ROOT[bar]);
      tone('triangle', i % 2 ? root * 2 : root, t, EIGHTH * 0.9, 0.32);

      // power chord chug on each beat (root + fifth)
      if (beatHit) {
        guitar(root * 2, t, EIGHTH * 1.1, 0.10);
        guitar(root * 2 * Math.pow(2, 7/12), t, EIGHTH * 1.1, 0.09);
      }

      // pad triad sustained across the bar (start of bar only)
      if (i === 0) {
        PAD[bar].forEach(n => tone('sine', noteFreq(n), t, EIGHTH * 8, 0.06));
      }

      // lead — canon arpeggio, eighth notes
      guitar(noteFreq(ARP[bar][i]), t, EIGHTH * 1.4, 0.14);
    }

    function loop() {
      while (nextTime < ctx.currentTime + 0.12) {
        scheduleStep(step, nextTime);
        nextTime += EIGHTH;
        step = (step + 1) % STEPS;
      }
      timer = setTimeout(loop, 25);
    }

    function ensure() {
      if (ctx) return;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.32;
      master.connect(ctx.destination);
      distCurve = makeDist(8);
      NB = noiseBuf();
    }

    return {
      start() {
        ensure();
        if (ctx.state === 'suspended') ctx.resume();
        if (started || muted) return;
        started = true;
        step = 0; nextTime = ctx.currentTime + 0.08;
        loop();
      },
      stop() {
        started = false;
        if (timer) { clearTimeout(timer); timer = null; }
      },
      toggleMute() {
        muted = !muted;
        if (muted) this.stop();
        return muted;
      },
      isMuted() { return muted; },
    };
  })();

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20;            // 20x20 格
  const SIZE = canvas.width / GRID; // 每格像素
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovDesc = document.getElementById('ovDesc');
  const startBtn = document.getElementById('startBtn');
  const rankEls = [...document.querySelectorAll('#ranks .rscore')];

  // ---- 排行榜 Top 3（最高分在最上，最低在最下）----
  let board = JSON.parse(localStorage.getItem('snakeBoard') || '[]');
  function renderBoard() {
    rankEls.forEach((el, i) => { el.textContent = board[i] != null ? board[i] : '—'; });
  }
  function addToBoard(s) {
    if (!s || s <= 0) return;
    board.unshift(s);              // 最新一局放最前，不分高低
    board = board.slice(0, 3);     // 只留最近 3 局
    localStorage.setItem('snakeBoard', JSON.stringify(board));
    renderBoard();
  }
  renderBoard();

  let snake, dir, nextDir, pimples, score, speed, loop, running, paused, eaten, boostMul, effectTimer;

  // 痘痘种类：颜色 + 效果（weight 越大越常见）
  const TYPES = [
    // 普通组（红/紫/蓝/金/绿）总权重 80，特殊组（彩虹/黑/粉）总权重 40 → 比例 2:1
    { key:'red',     color:'#ff5c6c', glow:'rgba(255,92,108,.85)', weight:16, pts:1,    label:'🔴 普通 +1' },
    { key:'gold',    color:'#ffcf45', glow:'rgba(255,207,69,.9)',  weight:16, pts:50,   label:'🟡 金痘 +50' },
    { key:'green',   color:'#5fd068', glow:'rgba(95,208,104,.9)',  weight:16, pts:200,  label:'🟢 绿痘 +200' },
    { key:'blue',    color:'#4db5ff', glow:'rgba(77,181,255,.9)',  weight:16, pts:5,    fx:'fast',       label:'🔵 蓝痘 加速2秒' },
    { key:'purple',  color:'#b07cff', glow:'rgba(176,124,255,.9)', weight:16, pts:5,    fx:'slow',       label:'🟣 紫痘 减速2秒' },
    { key:'pink',    color:'#ff8fd0', glow:'rgba(255,143,208,.9)', weight:14, pts:500,  label:'🌸 粉痘 +500' },
    { key:'black',   color:'#1c1c26', glow:'rgba(200,200,225,.75)',weight:13, pts:0,    fx:'double',     label:'⚫ 黑痘 分数翻倍' },
    { key:'rainbow', color:'#ff5c6c', glow:'rgba(255,255,255,.9)', weight:13, pts:0,    fx:'collectAll', label:'🌈 彩虹 吃光全屏' },
  ];
  const byKey = k => TYPES.find(t => t.key === k);
  const TOTAL_W = TYPES.reduce((a,t)=>a+t.weight,0);
  const PIMPLE_COUNT = 6;   // 屏幕上同时存在的痘痘数量
  function randType() {
    let r = Math.random() * TOTAL_W;
    for (const t of TYPES) { if ((r -= t.weight) < 0) return t; }
    return TYPES[0];
  }


  function reset() {
    snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    speed = 170;
    eaten = 0;
    boostMul = 1;
    clearTimeout(effectTimer);
    scoreEl.textContent = 0;
    pimples = [];
    refillPimples();
  }

  function emptyCell() {
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y) ||
             pimples.some(q => q.x === p.x && q.y === p.y));
    return p;
  }
  function addPimpleOf(type) {
    const p = emptyCell();
    p.type = type;
    p.wobble = Math.random() * Math.PI * 2;
    pimples.push(p);
  }
  function refillPimples() {
    // 按权重随机填满（各颜色概率见 TYPES 的 weight）
    while (pimples.length < PIMPLE_COUNT) addPimpleOf(randType());
  }
  function refreshPimples() {
    pimples = [];
    refillPimples();
    if (running && !paused) draw();
  }

  function curSpeed() { return Math.max(45, Math.round(speed * boostMul)); }
  function restartLoop() { clearInterval(loop); loop = setInterval(tick, curSpeed()); }
  function setBoost(mul, ms) {
    boostMul = mul;
    restartLoop();
    clearTimeout(effectTimer);
    effectTimer = setTimeout(() => { boostMul = 1; if (running && !paused) restartLoop(); }, ms);
  }
  function applyEffect(t) {
    addScore(t.pts);
    eaten++;
    // 吃到音效：大奖用上扬三连音，普通用清脆一声
    if (t.fx === 'collectAll' || t.fx === 'double' || t.pts >= 200) clearSound();
    else beep(680 + Math.min(t.pts, 60) * 6, 0.06, 'triangle');
    // 每吃 5 颗稍微加速（与分值脱钩，绿痘加 200 也只算 1 颗）
    if (eaten % 5 === 0 && speed > 100) { speed -= 8; restartLoop(); }
    if (t.fx === 'fast')   setBoost(0.5, 2000);   // 蓝：加速 2 秒
    if (t.fx === 'slow')   setBoost(1.8, 2000);   // 紫：减速 2 秒
    if (t.fx === 'shrink') { for (let i = 0; i < 5 && snake.length > 3; i++) snake.pop(); }  // 粉：缩短
    if (t.fx === 'collectAll') {                  // 彩虹：吃光全屏其它痘痘
      pimples.forEach(p => addScore(p.type.pts));
      pimples = [];
    }
    if (t.fx === 'double') addScore(score);       // 黑：分数翻倍
  }

  function start() {
    addToBoard(score);   // 先把上一局的成绩计入排行榜
    reset();
    overlay.classList.add('hidden');
    running = true;
    paused = false;
    beep(440, 0.05, 'sine', 0.05);   // 解锁音频
    MUSIC.start();                    // 摇滚卡农 BGM
    restartLoop();
  }

  const MAX_SCORE = 100000000000;

  function addScore(n) {
    score = Math.min(score + n, MAX_SCORE);
    scoreEl.textContent = score;
    if (score >= MAX_SCORE) return gameWin();
  }

  function cheat() {
    // 蛇身加 10 节（在尾巴处复制最后一节）
    const tail = snake[snake.length - 1];
    for (let i = 0; i < 10; i++) snake.push({ x: tail.x, y: tail.y });
    addScore(10000000000);
  }

  function gameWin() {
    running = false;
    clearInterval(loop);
    addToBoard(score);
    ovTitle.textContent = '🎉 满分通关！';
    ovDesc.innerHTML = `你吃满了 <b style="color:var(--accent)">1000 亿</b> 分，整张脸清空啦！✨`;
    startBtn.textContent = '再来一局';
    overlay.classList.remove('hidden');
  }

  function gameOver() {
    running = false;
    clearInterval(loop);
    MUSIC.stop();
    badSound();
    addToBoard(score);
    ovTitle.textContent = '💀 痘痘赢了！';
    ovDesc.innerHTML = `你吃掉了 <b style="color:var(--accent)">${score}</b> 分<br>再来一局把脸清空吧～`;
    startBtn.textContent = '再来一局';
    overlay.classList.remove('hidden');
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      clearInterval(loop);
      ovTitle.textContent = '⏸ 暂停中';
      ovDesc.textContent = '按空格或点击按钮继续';
      startBtn.textContent = '继续';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      restartLoop();
    }
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞墙 → 从另一边穿出来（新手友好，不会死）
    head.x = (head.x + GRID) % GRID;
    head.y = (head.y + GRID) % GRID;
    // 碰到自己的身体也可以直接穿透，不会死

    snake.unshift(head);

    const idx = pimples.findIndex(p => p.x === head.x && p.y === head.y);
    if (idx >= 0) {
      const t = pimples[idx].type;
      pimples.splice(idx, 1);
      applyEffect(t);
      refillPimples();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 各色痘痘
    pimples.forEach(p => {
      const cx = p.x * SIZE + SIZE / 2;
      const cy = p.y * SIZE + SIZE / 2;
      const pulse = 1 + Math.sin(Date.now() / 200 + p.wobble) * 0.1;
      const r = SIZE * 0.4 * pulse;
      // 彩虹痘：颜色随时间循环
      let color = p.type.color, glow = p.type.glow;
      if (p.type.key === 'rainbow') {
        const hue = (Date.now() / 8 + p.wobble * 60) % 360;
        color = `hsl(${hue}, 90%, 60%)`;
        glow = `hsla(${hue}, 90%, 60%, .9)`;
      }
      // 红肿外圈
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = glow;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      // 白色脓头
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.42, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.fill();
    });

    // 蛇
    snake.forEach((s, i) => {
      const x = s.x * SIZE, y = s.y * SIZE;
      const pad = i === 0 ? 1 : 2;
      const t = i / snake.length;
      ctx.fillStyle = i === 0 ? '#7cf08a' : `rgb(${60 - t*15}, ${200 - t*70}, ${100 - t*30})`;
      roundRect(x + pad, y + pad, SIZE - pad*2, SIZE - pad*2, 6);
      ctx.fill();
    });

    // 蛇眼睛
    const h = snake[0];
    const hx = h.x * SIZE, hy = h.y * SIZE;
    ctx.fillStyle = '#16202c';
    const ex = dir.x, ey = dir.y;
    const e1 = eyePos(hx, hy, ex, ey, -1);
    const e2 = eyePos(hx, hy, ex, ey, 1);
    ctx.beginPath(); ctx.arc(e1.x, e1.y, 2.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(e2.x, e2.y, 2.2, 0, 7); ctx.fill();
  }

  function eyePos(hx, hy, dx, dy, side) {
    const c = SIZE / 2;
    // 垂直于方向的偏移
    const px = -dy * side, py = dx * side;
    const fwd = 4;
    return {
      x: hx + c + dx * fwd + px * 4,
      y: hy + c + dy * fwd + py * 4
    };
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // 平滑动画痘痘脉动
  (function animate() {
    if (running && !paused) draw();
    requestAnimationFrame(animate);
  })();

  // ---- 控制 ----
  function setDir(x, y) {
    // 禁止 180 度掉头
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  function toggleFullscreen() {
    const el = document.querySelector('.stage');
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  // 可见的全屏按钮（与 F 键等效）
  (function(){
    const b = document.createElement('button');
    b.id = '__fsbtn'; b.title = '全屏'; b.setAttribute('aria-label','全屏');
    b.style.cssText = 'position:fixed;top:12px;right:12px;z-index:99999;width:40px;height:40px;border:none;border-radius:10px;background:rgba(0,0,0,.4);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);';
    const F='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4"/></svg>';
    const X='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h4V4M20 8h-4V4M4 16h4v4M20 16h-4v4"/></svg>';
    const u=()=>{ b.innerHTML = document.fullscreenElement ? X : F; };
    b.onclick=()=>{ toggleFullscreen(); b.blur(); };
    document.addEventListener('fullscreenchange',u);
    document.body.appendChild(b); u();
  })();

  // 🎵 背景音乐开关
  (function(){
    const b = document.createElement('button');
    b.id = '__musicbtn'; b.title = '背景音乐'; b.textContent = '🎵';
    b.style.cssText = 'position:fixed;top:12px;right:60px;z-index:99999;width:40px;height:40px;border:none;border-radius:10px;background:rgba(0,0,0,.4);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);';
    b.onclick = () => {
      const muted = MUSIC.toggleMute();
      b.style.opacity = muted ? '.4' : '1';
      b.textContent = muted ? '🔇' : '🎵';
      if (!muted && running) MUSIC.start();
      b.blur();
    };
    document.body.appendChild(b);
  })();

  document.addEventListener('keydown', e => {
    const k = e.key;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();

    if (k === 'f' || k === 'F') { toggleFullscreen(); return; }
    if (k === 'j' || k === 'J') { document.querySelector('.stage').classList.toggle('big'); return; }
    if (k === 'r' || k === 'R') { start(); return; }   // 随时重新开始

    // 游戏没在跑时，任意方向键/空格都直接开始
    if (!running) {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','a','s','d','W','A','S','D'].includes(k)) {
        start();
      }
      return;
    }

    switch (k) {
      case 'ArrowUp': case 'w': case 'W': setDir(0, -1); break;
      case 'ArrowDown': case 's': case 'S': setDir(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1, 0); break;
      case ' ': togglePause(); break;
      case 'c': case 'C': cheat(); break;  // 作弊：+10 分 & +10 长度
    }
  });

  // 触摸滑动
  let tx = 0, ty = 0;
  canvas.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive: true});
  canvas.addEventListener('touchmove', e => {
    if (!running) return;
    const dx = e.touches[0].clientX - tx;
    const dy = e.touches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive: true});

  startBtn.addEventListener('click', () => {
    if (paused) togglePause(); else start();
  });
  // 点开始/结束界面的任意位置都能开始（更稳妥，避免只能点按钮）
  overlay.addEventListener('click', (e) => {
    if (e.target === startBtn) return;   // 按钮自己处理，避免重复
    if (!running) start();
  });

  // ---- 鼠标操作：蛇头朝鼠标方向走 ----
  canvas.addEventListener('mousemove', e => {
    if (!running || paused) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * GRID;
    const my = (e.clientY - rect.top) / rect.height * GRID;
    const h = snake[0];
    const dx = mx - (h.x + 0.5);
    const dy = my - (h.y + 0.5);
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else if (dy !== 0)              setDir(0, dy > 0 ? 1 : -1);
  });
  // 在画布上点一下也能开局
  canvas.addEventListener('click', () => { if (!running) start(); });
  canvas.style.cursor = 'crosshair';

  // ---- 屏幕上的方向键 ----
  const DIRS = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] };
  document.querySelectorAll('.pad').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!running) { start(); return; }   // 没在玩就先开局
      const [x, y] = DIRS[btn.dataset.dir];
      setDir(x, y);
    });
  });

  // ---- 屏幕上的功能按钮 ----
  document.querySelectorAll('.act').forEach(btn => {
    btn.addEventListener('click', () => {
      switch (btn.dataset.act) {
        case 'start':   if (!running) start(); else if (paused) togglePause(); break;
        case 'pause':   togglePause(); break;
        case 'restart': start(); break;
        case 'refresh': if (running) refreshPimples(); break;
        case 'cheat':   if (running) cheat(); break;
        case 'big':     document.querySelector('.stage').classList.toggle('big'); break;
      }
    });
  });
})();
</script>
</body>
</html>
