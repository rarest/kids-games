<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>大鱼吃小鱼 🐟</title>
<style>
  :root {
    --bg: #032b43;
    --bg2: #04668f;
    --panel: rgba(2, 30, 48, .72);
    --text: #eaf6ff;
    --accent: #ffd166;
    --accent2: #06d6a0;
    --danger: #ef476f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: linear-gradient(180deg, #04668f 0%, #032b43 70%, #021c30 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
    overflow: hidden;
  }
  body { align-self: stretch; width: 100%; }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
  h1 span { color: var(--accent); }
  .hud {
    display: flex;
    gap: 22px;
    font-size: 14px;
    font-weight: 600;
    align-items: center;
  }
  .hud b { color: var(--accent); font-size: 18px; }
  .hud .lvl b { color: var(--accent2); }
  .stage {
    position: relative;
    flex: 1 1 auto;
    align-self: stretch;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    min-height: 0;
    border-radius: 18px;
    box-shadow: 0 16px 50px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.06);
    overflow: hidden;
    background: linear-gradient(180deg, #0a7ab0, #045b86 60%, #023a5c);
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  :fullscreen .stage { max-width: none; border-radius: 0; }
  :-webkit-full-screen .stage { max-width: none; border-radius: 0; }

  /* Overlay panels */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(2, 22, 38, .78);
    backdrop-filter: blur(3px);
    text-align: center;
    padding: 20px;
    z-index: 5;
  }
  .overlay.hidden { display: none; }
  .overlay h2 { font-size: 26px; }
  .overlay p { font-size: 14px; opacity: .85; max-width: 320px; line-height: 1.5; }
  input[type=text] {
    width: 220px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.08);
    color: var(--text);
    font-size: 16px;
    text-align: center;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button {
    cursor: pointer;
    border: none;
    border-radius: 14px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 700;
    color: #042033;
    background: linear-gradient(180deg, var(--accent), #f5a623);
    box-shadow: 0 6px 16px rgba(0,0,0,.35);
    transition: transform .08s;
  }
  button:active { transform: translateY(2px); }
  button.ghost {
    background: rgba(255,255,255,.12);
    color: var(--text);
    box-shadow: none;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* Leaderboard */
  .board {
    width: 100%;
    max-width: 320px;
    background: var(--panel);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 13px;
  }
  .board h3 { font-size: 14px; margin-bottom: 6px; color: var(--accent); display: flex; justify-content: space-between; }
  .board ol { list-style: none; }
  .board li {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .board li:last-child { border-bottom: none; }
  .board li .rank { width: 26px; color: var(--accent2); font-weight: 700; }
  .board li .nm { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board li .sc { font-weight: 700; }
  .board li.me { color: var(--accent); }
  .board .empty { opacity: .6; padding: 6px 0; }

  /* Controls hint */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 12px;
    opacity: .8;
  }
  .iconbtn {
    background: rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 13px;
    color: var(--text);
    box-shadow: none;
  }
  .medal { font-size: 15px; }
</style>
</head>
<body>
  <h1>🐟 大鱼<span>吃</span>小鱼</h1>
  <div class="hud">
    <div class="lvl">等级 <b id="level">1</b></div>
    <div>分数 <b id="score">0</b></div>
    <div>最高 <b id="best">0</b></div>
  </div>

  <div class="stage" id="stage">
    <canvas id="game"></canvas>

    <!-- Start / name overlay -->
    <div class="overlay" id="startOverlay">
      <h2>🐟 大鱼吃小鱼</h2>
      <p>吃掉比你<b>小</b>的鱼会变大，碰到比你<b>大</b>的鱼就会被吃掉！<br>用 <b>方向键 / WASD</b> 或<b>手指拖动</b>控制方向。</p>
      <input type="text" id="nameInput" maxlength="12" placeholder="输入你的名字" autocomplete="off">
      <div class="row">
        <button id="startBtn">开始游戏 ▶</button>
        <button class="iconbtn" id="muteBtn">🔊 音乐</button>
      </div>
      <div class="board" id="boardStart"></div>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="overOverlay">
      <h2 id="overTitle">游戏结束</h2>
      <p id="overMsg"></p>
      <div class="board" id="boardOver"></div>
      <div class="row">
        <button id="againBtn">再来一次 🔁</button>
        <button class="ghost" id="changeBtn">换名字</button>
      </div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay hidden" id="pauseOverlay">
      <h2>⏸ 暂停</h2>
      <div class="row"><button id="resumeBtn">继续 ▶</button></div>
    </div>
  </div>

  <div class="controls">
    <span>P 暂停 · 空格/点击控制</span>
    <button class="iconbtn" id="muteBtn2">🔊</button>
  </div>

<script>
(() => {
  'use strict';

  // ---------- Canvas sizing ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  // Logical play-field size
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  const stageEl = document.getElementById('stage');
  function fitCanvas() {
    // 跟随 .stage 的实际尺寸自适应（弹性填满，全屏时撑满整屏）
    const w = stageEl.clientWidth || (window.innerWidth - 28);
    const h = stageEl.clientHeight || (window.innerHeight - 180);
    W = Math.max(280, Math.floor(w));
    H = Math.max(320, Math.floor(h));
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // ---------- Storage / Leaderboard ----------
  const LB_KEY = 'bigfish_leaderboard_v1';
  const NAME_KEY = 'bigfish_name';
  function loadBoard() {
    try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
    catch { return []; }
  }
  function saveBoard(b) { localStorage.setItem(LB_KEY, JSON.stringify(b)); }
  // Keep best score per player name; sorted desc; top 10 shown.
  function submitScore(name, score) {
    const board = loadBoard();
    const existing = board.find(e => e.name === name);
    if (existing) {
      if (score > existing.score) { existing.score = score; existing.at = Date.now(); }
    } else {
      board.push({ name, score, at: Date.now() });
    }
    board.sort((a, b) => b.score - a.score || a.at - b.at);
    saveBoard(board);
    return board;
  }
  function bestScore() {
    const board = loadBoard();
    return board.length ? board[0].score : 0;
  }
  function renderBoard(el, highlightName) {
    const board = loadBoard().slice(0, 10);
    const medals = ['🥇', '🥈', '🥉'];
    let rows = '';
    if (!board.length) {
      rows = '<li class="empty">还没有记录，快来抢第一名！</li>';
    } else {
      board.forEach((e, i) => {
        const medal = medals[i] || (i + 1);
        const me = e.name === highlightName ? ' class="me"' : '';
        rows += `<li${me}><span class="rank ${i<3?'medal':''}">${medal}</span>` +
                `<span class="nm">${escapeHtml(e.name)}</span>` +
                `<span class="sc">${e.score}</span></li>`;
      });
    }
    el.innerHTML = `<h3><span>🏆 排行榜</span><span>分数</span></h3><ol>${rows}</ol>`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ---------- Audio: Canon rock + SFX (WebAudio synth) ----------
  const Audio = (() => {
    let ctxA = null, master = null, musicGain = null, sfxGain = null;
    let muted = localStorage.getItem('bigfish_muted') === '1';
    let musicTimer = null, started = false;

    function ensure() {
      if (ctxA) return;
      ctxA = new (window.AudioContext || window.webkitAudioContext)();
      master = ctxA.createGain();
      master.gain.value = muted ? 0 : 0.9;
      master.connect(ctxA.destination);
      musicGain = ctxA.createGain();
      musicGain.gain.value = 0.35;
      musicGain.connect(master);
      sfxGain = ctxA.createGain();
      sfxGain.gain.value = 0.6;
      sfxGain.connect(master);
    }

    // Pachelbel's Canon in D chord progression (D A Bm F#m G D G A)
    // Encoded as MIDI roots; we play a rock arrangement: bass + power chords + melody arpeggio.
    const prog = [62, 57, 59, 54, 55, 50, 55, 57]; // D A B F# G D G A (octave 4ish)
    const beatsPerChord = 4;
    let step = 0;       // sixteenth-note counter
    const bpm = 116;
    const sixteenth = 60 / bpm / 4;

    function note(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

    function playOsc(freq, t, dur, type, gain, glideTo) {
      const o = ctxA.createOscillator();
      const g = ctxA.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t + dur + 0.02);
    }

    // distorted power chord = root + fifth on sawtooth
    function powerChord(root, t, dur, gain) {
      playOsc(note(root), t, dur, 'sawtooth', gain);
      playOsc(note(root + 7), t, dur, 'sawtooth', gain * 0.8);
      playOsc(note(root + 12), t, dur, 'square', gain * 0.4);
    }

    // melodic arpeggio pattern over the chord (the recognizable Canon line)
    const arpPattern = [0, 4, 7, 12, 7, 4, 7, 12];

    function scheduleBar(barStartT) {
      for (let s = 0; s < 16; s++) {
        const t = barStartT + s * sixteenth;
        const chordIdx = Math.floor(s / beatsPerChord) % prog.length === 0
          ? 0 : 0; // placeholder, real index below
      }
    }

    let scheduleAhead = 0.2;
    let nextNoteTime = 0;

    function scheduler() {
      if (!started) return;
      while (nextNoteTime < ctxA.currentTime + scheduleAhead) {
        const s16 = step % 16;
        const chordPos = Math.floor((step % (prog.length * beatsPerChord * 4)) / (beatsPerChord * 4)) % prog.length;
        const root = prog[chordPos];
        // Bass on every quarter (every 4 sixteenths)
        if (s16 % 4 === 0) {
          playOsc(note(root - 12), nextNoteTime, sixteenth * 3.6, 'triangle', 0.5, note(root - 12) * 0.999);
        }
        // Power chord stabs on the back-beat eighths
        if (s16 % 8 === 4) {
          powerChord(root, nextNoteTime, sixteenth * 5, 0.16);
        } else if (s16 % 8 === 0) {
          powerChord(root, nextNoteTime, sixteenth * 3, 0.10);
        }
        // Lead arpeggio every other sixteenth
        if (s16 % 2 === 0) {
          const ai = (step / 2) % arpPattern.length | 0;
          const lead = root + 12 + arpPattern[(step >> 1) % arpPattern.length];
          playOsc(note(lead), nextNoteTime, sixteenth * 1.8, 'square', 0.12);
        }
        // Hi-hat-ish noise click every sixteenth (light)
        if (s16 % 2 === 1) hat(nextNoteTime, 0.04);
        // Kick on 1 and 3
        if (s16 === 0 || s16 === 8) kick(nextNoteTime);
        // Snare on 2 and 4
        if (s16 === 4 || s16 === 12) snare(nextNoteTime);

        nextNoteTime += sixteenth;
        step++;
      }
      musicTimer = setTimeout(scheduler, 25);
    }

    function kick(t) {
      const o = ctxA.createOscillator(), g = ctxA.createGain();
      o.frequency.setValueAtTime(140, t);
      o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
      g.gain.setValueAtTime(0.7, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t + 0.18);
    }
    function snare(t) {
      const noise = noiseBurst(t, 0.12, 1800);
      noise.connect(musicGain);
      const o = ctxA.createOscillator(), g = ctxA.createGain();
      o.type = 'triangle'; o.frequency.value = 190;
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t + 0.12);
    }
    function hat(t, dur) {
      const n = noiseBurst(t, dur, 7000);
      const g = ctxA.createGain();
      g.gain.setValueAtTime(0.06, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      n.connect(g); g.connect(musicGain);
    }
    function noiseBurst(t, dur, hz) {
      const len = Math.floor(ctxA.sampleRate * dur);
      const buf = ctxA.createBuffer(1, len, ctxA.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = ctxA.createBufferSource(); src.buffer = buf;
      const hp = ctxA.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = hz;
      src.connect(hp);
      src.start(t);
      return hp;
    }

    function startMusic() {
      ensure();
      if (ctxA.state === 'suspended') ctxA.resume();
      if (started) return;
      started = true;
      step = 0;
      nextNoteTime = ctxA.currentTime + 0.08;
      scheduler();
    }
    function stopMusic() {
      started = false;
      if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
    }
    function setMuted(m) {
      muted = m;
      localStorage.setItem('bigfish_muted', m ? '1' : '0');
      if (master) master.gain.setTargetAtTime(m ? 0 : 0.9, ctxA.currentTime, 0.02);
    }
    function isMuted() { return muted; }

    // ---- SFX ----
    function blip(freq, dur, type, gain, glide) {
      ensure();
      if (ctxA.state === 'suspended') ctxA.resume();
      const t = ctxA.currentTime;
      const o = ctxA.createOscillator(), g = ctxA.createGain();
      o.type = type || 'square';
      o.frequency.setValueAtTime(freq, t);
      if (glide) o.frequency.exponentialRampToValueAtTime(glide, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain || 0.4, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + dur + 0.02);
    }
    const sfx = {
      eat()    { blip(520, 0.12, 'square', 0.35, 880); },
      grow()   { blip(440, 0.2, 'triangle', 0.4, 1320); blip(660, 0.18, 'square', 0.2, 990); },
      die()    { blip(330, 0.5, 'sawtooth', 0.45, 70); },
      level()  { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.3),i*90)); },
      click()  { blip(700, 0.05, 'square', 0.25); },
    };

    return { startMusic, stopMusic, setMuted, isMuted, sfx, ensure };
  })();

  // ---------- Game ----------
  const game = {
    state: 'menu', // menu | playing | paused | over
    player: null,
    fishes: [],
    bubbles: [],
    particles: [],
    score: 0,
    level: 1,
    time: 0,
    spawnTimer: 0,
    name: localStorage.getItem(NAME_KEY) || '',
    input: { x: 0, y: 0 }, // direction vector toward target
    pointer: null,
  };

  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function makePlayer() {
    return {
      x: W / 2, y: H / 2, vx: 0, vy: 0,
      size: 16, dir: 1, // facing right(1)/left(-1)
      color: '#ffd166', isPlayer: true,
      wob: 0,
    };
  }

  // Enemy fish color palette
  const FISH_COLORS = ['#ef476f','#118ab2','#06d6a0','#f78c6b','#8338ec','#fb5607','#3a86ff','#ff006e'];

  function spawnFish() {
    const p = game.player;
    // Difficulty: bias sizes around player size; more big fish at higher levels
    const r = Math.random();
    let size;
    if (r < 0.55) size = rand(p.size * 0.35, p.size * 0.85);      // edible
    else if (r < 0.82) size = rand(p.size * 0.9, p.size * 1.3);   // risky / slightly bigger
    else size = rand(p.size * 1.4, p.size * 2.4 + game.level);    // dangerous
    size = clamp(size, 7, 90);

    const fromLeft = Math.random() < 0.5;
    const speed = rand(0.5, 1.4) + game.level * 0.06;
    const y = rand(size, H - size);
    game.fishes.push({
      x: fromLeft ? -size * 2 : W + size * 2,
      y,
      vx: (fromLeft ? 1 : -1) * speed,
      vy: rand(-0.2, 0.2),
      size,
      dir: fromLeft ? 1 : -1,
      color: FISH_COLORS[(Math.random() * FISH_COLORS.length) | 0],
      wob: rand(0, Math.PI * 2),
    });
  }

  function spawnBubble() {
    game.bubbles.push({
      x: rand(0, W), y: H + 10,
      r: rand(2, 7), spd: rand(0.4, 1.4), wob: rand(0, 6.28),
    });
  }

  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, 6.28), s = rand(0.5, 3.5);
      game.particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, color,
      });
    }
  }

  function resetGame() {
    game.player = makePlayer();
    game.fishes = [];
    game.bubbles = [];
    game.particles = [];
    game.score = 0;
    game.level = 1;
    game.time = 0;
    game.spawnTimer = 0;
    for (let i = 0; i < 6; i++) spawnFish();
    for (let i = 0; i < 14; i++) {
      game.bubbles.push({ x: rand(0, W), y: rand(0, H), r: rand(2, 7), spd: rand(0.4, 1.4), wob: rand(0, 6.28) });
    }
  }

  // ---------- Input ----------
  const keys = {};
  window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p') togglePause();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx, y: cy };
  }
  function setPointer(e) {
    if (game.state !== 'playing') return;
    e.preventDefault();
    game.pointer = pointerPos(e);
  }
  canvas.addEventListener('mousedown', setPointer);
  canvas.addEventListener('mousemove', e => { if (e.buttons) setPointer(e); });
  canvas.addEventListener('mouseup', () => game.pointer = null);
  canvas.addEventListener('touchstart', setPointer, { passive: false });
  canvas.addEventListener('touchmove', setPointer, { passive: false });
  canvas.addEventListener('touchend', () => game.pointer = null);

  function readInput() {
    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    if (keys['arrowup'] || keys['w']) dy -= 1;
    if (keys['arrowdown'] || keys['s']) dy += 1;
    if (game.pointer) {
      const px = game.pointer.x - game.player.x;
      const py = game.pointer.y - game.player.y;
      const d = Math.hypot(px, py);
      if (d > 6) { dx += px / d; dy += py / d; }
    }
    const m = Math.hypot(dx, dy);
    if (m > 0) { dx /= m; dy /= m; }
    game.input.x = dx;
    game.input.y = dy;
  }

  // ---------- Update ----------
  function update(dt) {
    game.time += dt;
    readInput();
    const p = game.player;
    const accel = 0.55;
    const maxSpeed = 3.4 + p.size * 0.012;
    p.vx += game.input.x * accel;
    p.vy += game.input.y * accel;
    // drag
    p.vx *= 0.92; p.vy *= 0.92;
    const sp = Math.hypot(p.vx, p.vy);
    if (sp > maxSpeed) { p.vx = p.vx / sp * maxSpeed; p.vy = p.vy / sp * maxSpeed; }
    p.x = clamp(p.x + p.vx, p.size, W - p.size);
    p.y = clamp(p.y + p.vy, p.size, H - p.size);
    if (Math.abs(p.vx) > 0.3) p.dir = p.vx > 0 ? 1 : -1;
    p.wob += sp * 0.06 + 0.05;

    // spawn enemies
    game.spawnTimer -= dt;
    const targetCount = 7 + game.level;
    if (game.spawnTimer <= 0 && game.fishes.length < targetCount) {
      spawnFish();
      game.spawnTimer = rand(0.4, 1.0);
    }

    // move fishes
    for (let i = game.fishes.length - 1; i >= 0; i--) {
      const f = game.fishes[i];
      f.x += f.vx;
      f.y += f.vy + Math.sin(game.time * 2 + f.wob) * 0.3;
      f.wob += 0.05;
      f.y = clamp(f.y, f.size, H - f.size);
      // remove off-screen
      if ((f.vx > 0 && f.x > W + f.size * 3) || (f.vx < 0 && f.x < -f.size * 3)) {
        game.fishes.splice(i, 1);
        continue;
      }
      // collision with player
      const d = Math.hypot(f.x - p.x, f.y - p.y);
      if (d < (f.size + p.size) * 0.72) {
        if (p.size >= f.size * 1.02) {
          // eat
          eatFish(f, i);
        } else if (f.size > p.size * 1.05) {
          // player dies
          die();
          return;
        }
      }
    }

    // bubbles
    if (Math.random() < 0.08) spawnBubble();
    for (let i = game.bubbles.length - 1; i >= 0; i--) {
      const b = game.bubbles[i];
      b.y -= b.spd;
      b.x += Math.sin(game.time * 2 + b.wob) * 0.3;
      if (b.y < -10) game.bubbles.splice(i, 1);
    }

    // particles
    for (let i = game.particles.length - 1; i >= 0; i--) {
      const pt = game.particles[i];
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.04;
      pt.life -= dt * 1.6;
      if (pt.life <= 0) game.particles.splice(i, 1);
    }
  }

  function eatFish(f, i) {
    game.fishes.splice(i, 1);
    const p = game.player;
    const gain = Math.max(1, Math.round(f.size));
    game.score += gain;
    // grow: bigger fish give more growth
    p.size = Math.min(120, p.size + f.size * 0.06 + 0.4);
    burst(f.x, f.y, f.color, 10);
    Audio.sfx.eat();
    // level up every threshold
    const newLevel = 1 + Math.floor(game.score / 80);
    if (newLevel > game.level) {
      game.level = newLevel;
      Audio.sfx.level();
      flash();
    } else if (f.size > p.size * 0.85) {
      Audio.sfx.grow();
    }
    updateHud();
  }

  let flashAlpha = 0;
  function flash() { flashAlpha = 0.5; }

  function die() {
    Audio.sfx.die();
    burst(game.player.x, game.player.y, game.player.color, 26);
    game.state = 'over';
    finishGame();
  }

  function finishGame() {
    const board = submitScore(game.name, game.score);
    const rank = board.findIndex(e => e.name === game.name) + 1;
    document.getElementById('overTitle').textContent =
      game.score >= bestScore() && game.score > 0 ? '🎉 新纪录！' : '游戏结束';
    document.getElementById('overMsg').innerHTML =
      `<b>${escapeHtml(game.name)}</b> 得分 <b>${game.score}</b> · 等级 ${game.level}<br>` +
      (rank > 0 ? `当前排名第 <b>${rank}</b> 名` : '');
    renderBoard(document.getElementById('boardOver'), game.name);
    updateHud();
    showOverlay('over');
  }

  // ---------- Render ----------
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // light rays background
    ctx.save();
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, 'rgba(120,220,255,0.12)');
    grd.addColorStop(1, 'rgba(0,40,70,0)');
    ctx.fillStyle = grd;
    for (let i = 0; i < 4; i++) {
      const x = (i + 0.5) / 4 * W + Math.sin(game.time * 0.3 + i) * 18;
      ctx.beginPath();
      ctx.moveTo(x - 30, 0); ctx.lineTo(x + 30, 0);
      ctx.lineTo(x + 80, H); ctx.lineTo(x - 80, H);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // bubbles
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5;
    for (const b of game.bubbles) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, 6.28);
      ctx.stroke();
    }

    // enemy fishes
    for (const f of game.fishes) drawFish(f, false);

    // player
    if (game.player && game.state !== 'over') drawFish(game.player, true);

    // particles
    for (const pt of game.particles) {
      ctx.globalAlpha = Math.max(0, pt.life);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3 * pt.life + 1, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // level-up flash
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,209,102,${flashAlpha})`;
      ctx.fillRect(0, 0, W, H);
      flashAlpha -= 0.02;
    }
  }

  function drawFish(f, isPlayer) {
    const s = f.size;
    const wob = Math.sin(f.wob) * 0.12;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.dir, 1);
    ctx.rotate(wob * 0.3);

    // tail
    ctx.fillStyle = shade(f.color, -18);
    ctx.beginPath();
    const tailW = s * 0.9;
    const tf = Math.sin(f.wob * 1.5) * s * 0.25;
    ctx.moveTo(-s * 0.7, 0);
    ctx.lineTo(-s * 0.7 - tailW, -s * 0.6 + tf);
    ctx.lineTo(-s * 0.7 - tailW, s * 0.6 + tf);
    ctx.closePath();
    ctx.fill();

    // body
    const bg = ctx.createLinearGradient(0, -s, 0, s);
    bg.addColorStop(0, shade(f.color, 30));
    bg.addColorStop(1, shade(f.color, -10));
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.66, 0, 0, 6.28);
    ctx.fill();

    // top fin
    ctx.fillStyle = shade(f.color, -8);
    ctx.beginPath();
    ctx.moveTo(-s * 0.2, -s * 0.55);
    ctx.quadraticCurveTo(s * 0.1, -s * 1.0, s * 0.4, -s * 0.5);
    ctx.closePath();
    ctx.fill();

    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * 0.45, -s * 0.12, s * 0.18, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = '#10202c';
    ctx.beginPath();
    ctx.arc(s * 0.5, -s * 0.12, s * 0.09, 0, 6.28);
    ctx.fill();

    // player crown / glow
    if (isPlayer) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, s + 3, s * 0.66 + 3, 0, 0, 6.28);
      ctx.stroke();
    }
    ctx.restore();
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amt, g = ((n >> 8) & 255) + amt, b = (n & 255) + amt;
    r = clamp(r, 0, 255); g = clamp(g, 0, 255); b = clamp(b, 0, 255);
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  // ---------- HUD / overlays ----------
  function updateHud() {
    document.getElementById('score').textContent = game.score;
    document.getElementById('level').textContent = game.level;
    document.getElementById('best').textContent = bestScore();
  }

  function showOverlay(which) {
    document.getElementById('startOverlay').classList.toggle('hidden', which !== 'menu');
    document.getElementById('overOverlay').classList.toggle('hidden', which !== 'over');
    document.getElementById('pauseOverlay').classList.toggle('hidden', which !== 'pause');
  }

  function startGame() {
    const nameInput = document.getElementById('nameInput');
    let name = (nameInput.value || '').trim();
    if (!name) name = '玩家' + Math.floor(Math.random() * 1000);
    game.name = name.slice(0, 12);
    localStorage.setItem(NAME_KEY, game.name);
    resetGame();
    updateHud();
    game.state = 'playing';
    showOverlay(null);
    Audio.startMusic();
  }

  function togglePause() {
    if (game.state === 'playing') { game.state = 'paused'; showOverlay('pause'); }
    else if (game.state === 'paused') { game.state = 'playing'; showOverlay(null); }
  }

  // ---------- Buttons ----------
  document.getElementById('startBtn').addEventListener('click', () => { Audio.sfx.click(); startGame(); });
  document.getElementById('againBtn').addEventListener('click', () => { Audio.sfx.click(); startGame(); });
  document.getElementById('resumeBtn').addEventListener('click', () => { Audio.sfx.click(); togglePause(); });
  document.getElementById('changeBtn').addEventListener('click', () => {
    Audio.sfx.click();
    game.state = 'menu';
    document.getElementById('nameInput').value = game.name;
    renderBoard(document.getElementById('boardStart'), game.name);
    showOverlay('menu');
  });
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
  });

  function refreshMuteBtns() {
    const label = Audio.isMuted() ? '🔇 静音' : '🔊 音乐';
    document.getElementById('muteBtn').textContent = label;
    document.getElementById('muteBtn2').textContent = Audio.isMuted() ? '🔇' : '🔊';
  }
  function toggleMute() {
    Audio.ensure();
    Audio.setMuted(!Audio.isMuted());
    refreshMuteBtns();
  }
  document.getElementById('muteBtn').addEventListener('click', toggleMute);
  document.getElementById('muteBtn2').addEventListener('click', toggleMute);

  // ---------- Main loop ----------
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (game.state === 'playing') update(dt);
    if (game.state !== 'menu') draw();
    requestAnimationFrame(loop);
  }

  // ---------- Init ----------
  document.getElementById('nameInput').value = game.name;
  renderBoard(document.getElementById('boardStart'), game.name);
  updateHud();
  refreshMuteBtns();
  // draw a static scene behind start overlay
  resetGame();
  requestAnimationFrame(loop);

  // pause when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && game.state === 'playing') togglePause();
  });
})();
</script>
